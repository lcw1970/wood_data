<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지압강도 예측 계산기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            .container-wrapper {
                margin: 15px auto !important;
                width: 95% !important;
            }
            .toss-card {
                padding: 18px !important;
                margin-bottom: 16px !important;
            }
            .toss-header-title {
                font-size: 1.35rem !important;
            }
            .btn-mobile-full {
                width: 100% !important;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container-wrapper" style="max-width: 800px; width: 92%; margin: 40px auto;">

    <!-- 상단 헤더 카드 -->
    <div class="toss-card d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-3">
        <div>
            <h1 class="toss-header-title mb-1">지압강도 예측 계산기</h1>
            <p class="toss-header-desc mb-0">목재 밀도 및 파스너 직경 기반 강도 계산</p>
        </div>
        <div>
            <a th:href="@{/}" class="btn-toss-secondary btn-mobile-full d-inline-block">
                ← DB 목록으로
            </a>
        </div>
    </div>

    <!-- 계산기 폼 카드 -->
    <div class="toss-card">
        <form th:action="@{/calculator}" method="post">
            <div class="row g-3 mb-4">
                <div class="col-12 col-md-6">
                    <label for="density" class="form-label fw-bold">목재 밀도 (kg/m³)</label>
                    <input type="number" step="0.1" id="density" name="density" class="form-control form-control-toss" placeholder="예: 450" required>
                </div>
                <div class="col-12 col-md-6">
                    <label for="diameter" class="form-label fw-bold">파스너 직경 (mm)</label>
                    <input type="number" step="0.1" id="diameter" name="diameter" class="form-control form-control-toss" placeholder="예: 8" required>
                </div>
            </div>

            <button type="submit" class="btn-toss-primary btn-mobile-full w-100 py-3 fw-bold">
                🧮 지압강도 계산하기
            </button>
        </form>
    </div>

    <!-- 계산 결과 표시 카드 -->
    <div th:if="${result != null}" class="toss-card border-primary">
        <h3 class="fw-bold mb-3">계산 결과</h3>
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <div class="p-3 bg-light rounded-3 text-center">
                    <div class="text-muted mb-1">섬유평행 지압강도</div>
                    <div class="fs-3 fw-bold text-primary" th:text="${result.parallelStrength + ' MPa'}"></div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="p-3 bg-light rounded-3 text-center">
                    <div class="text-muted mb-1">섬유직각 지압강도</div>
                    <div class="fs-3 fw-bold text-success" th:text="${result.perpStrength + ' MPa'}"></div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
