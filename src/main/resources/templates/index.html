<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수종별 지압강도 데이터베이스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div style="max-width: 1200px; width: 92%; margin: 40px auto;">

    <!-- 상단 헤더 카드 -->
    <div class="toss-card d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <h1 class="toss-header-title mb-1">글로벌 수종별 지압강도 DB</h1>
            <p class="toss-header-desc mb-0">학명 기준 목재 물성 데이터 및 원문 출처 서비스</p>
        </div>
        <div>
            <a th:href="@{/calculator}" class="btn-toss-primary">
                예측 계산기 바로가기
            </a>
        </div>
    </div>

    <!-- 데이터 목록 카드 -->
    <div class="toss-card">
        <!-- 검색창 -->
        <div class="row mb-4">
            <div class="col-md-5 ms-auto">
                <input type="text" id="searchInput" class="form-control form-control-toss" onkeyup="filterTable()" placeholder="🔍 학명(Scientific Name) 검색...">
            </div>
        </div>

        <!-- 테이블 -->
        <div class="table-responsive">
            <table class="toss-table text-center align-middle" id="woodTable">
                <thead>
                <tr>
                    <th style="width: 60px;">번호</th>
                    <th class="text-start">학명 (Scientific Name)</th>
                    <th>분류</th>
                    <th>밀도 (kg/m³)</th>
                    <th>스크류/파스너 (mm)</th>
                    <th>섬유평행 지압강도 (MPa)</th>
                    <th>섬유직각 지압강도 (MPa)</th>
                    <th>표준</th>
                    <th>원문</th>
                </tr>
                </thead>
                <tbody>
                <!-- stat 변수를 추가하여 번호(stat.count) 산출 -->
                <tr th:each="wood, stat : ${woodList}">
                    <!-- 순번 표시 -->
                    <td class="text-muted fw-semibold" th:text="${stat.count}"></td>

                    <!-- 학명 -->
                    <td class="text-start fw-bold fst-italic" th:text="${wood.scientificName}"></td>

                    <!-- '침엽수' 단어가 포함되어 있으면 파란색, 아니면 노란색 뱃지 적용 -->
                    <td>
                            <span th:class="${#strings.contains(wood.category, '침엽수')} ? 'badge-toss-blue' : 'badge-toss-yellow'"
                                  th:text="${wood.category}">
                            </span>
                    </td>

                    <td th:text="${wood.densityRange}"></td>
                    <td th:text="${wood.screwRange}"></td>
                    <td class="fw-bold text-primary" th:text="${wood.parallelStrength}"></td>
                    <td class="fw-bold text-success" th:text="${wood.perpStrength}"></td>
                    <td><span class="badge-toss-gray" th:text="${wood.standard}"></span></td>
                    <td>
                        <a th:href="${wood.paperUrl}" target="_blank" class="btn-toss-link">
                            보기 ↗
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function filterTable() {
        let input = document.getElementById("searchInput");
        let filter = input.value.toLowerCase();
        let table = document.getElementById("woodTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            // 검색 범위를 학명(2번째 td)으로 지정 (인덱스 1)
            let td = tr[i].getElementsByTagName("td")[1];
            if (td) {
                let txtValue = td.textContent || td.innerText;
                if (txtValue.toLowerCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
</script>
</body>
</html>
